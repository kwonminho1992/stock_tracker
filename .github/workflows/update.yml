name: update-market-disparity

on:
  schedule:
    # 평일 매시간 :20, :50 두 번 실행(이중화). GitHub 스케줄은 UTC 기준이며
    # 고부하 시 지연/누락될 수 있어, 시간당 2회로 누락 위험을 줄인다.
    # 값이 직전과 같으면 update.py 가 커밋하지 않으므로 중복 커밋은 생기지 않는다.
    - cron: "20 * * * 1-5"
    - cron: "50 * * * 1-5"
  workflow_dispatch:
    inputs:
      run_type:
        description: "갱신 모드 (intraday=장중 현재가 / close=종가)"
        type: choice
        options:
          - intraday
          - close
        default: intraday

permissions:
  contents: write

# 동시에 한 번만 실행. 새 실행이 뜨면 멎었을 수 있는 이전 실행을 취소하고
# 최신 데이터로 진행한다(데이터 갱신은 최신이 우선 → 큐 정체 자가 치유).
concurrency:
  group: update-market-disparity
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    # 멎은 실행이 6시간(기본)까지 매달려 concurrency 큐를 막지 않도록 상한을 둔다.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run tests (pytest 있으면 실행, 없으면 스킵)
        run: |
          if python -c "import pytest" 2>/dev/null; then
            echo "pytest 발견 → 테스트 실행"
            pytest -q
          else
            echo "pytest 없음 → 테스트 스킵"
          fi

      - name: Update data
        # 스케줄 실행은 intraday(지연시세), 수동 실행은 선택한 모드 사용.
        run: python scripts/update.py --run-type "${{ github.event_name == 'schedule' && 'intraday' || github.event.inputs.run_type || 'close' }}" --force

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json docs/data/history.json
          if git diff --cached --quiet; then
            echo "변경사항 없음 → 커밋하지 않음"
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%dT%H:%MZ")
          git commit -m "data: update market disparity ${ts}"
          n=0
          until git push; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then
              echo "push 3회 실패 → 종료"
              exit 1
            fi
            echo "push 실패, 재시도 ${n} ..."
            git pull --rebase --autostash || true
            sleep 5
          done
          echo "push 완료"
